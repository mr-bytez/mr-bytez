# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Traefik — Authentik Forward-Auth Middleware                               ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  Pfad:         .../traefik/config/dynamic/authentik.yml                    ║
# ║  Autor:        MR-ByteZ                                                    ║
# ║  Version:      0.1.0                                                       ║
# ║  Erstellt:     2026-03-05                                                  ║
# ║  Aktualisiert: 2026-03-05                                                  ║
# ║  Zweck:        Forward-Auth via Authentik Embedded Outpost                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

http:
  middlewares:
    # --- Authentik Forward-Auth ---
    # Leitet Authentifizierung an Authentik Embedded Outpost weiter.
    # Voraussetzung: In Authentik muss ein Proxy Provider + Application
    # fuer die geschuetzte Domain konfiguriert sein.
    # Aktivierung: Router-Label "middlewares=authentik-forward-auth@file"
    authentik-forward-auth:
      forwardAuth:
        address: http://mrbz-authentik-server:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
