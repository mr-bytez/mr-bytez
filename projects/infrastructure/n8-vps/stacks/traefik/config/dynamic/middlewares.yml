# ║  Traefik — Dynamische Middlewares                                           ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  Pfad:         .../traefik/config/dynamic/middlewares.yml                   ║
# ║  Autor:        MR-ByteZ                                                    ║
# ║  Version:      0.1.0                                                       ║
# ║  Erstellt:     2026-03-01                                                  ║
# ║  Aktualisiert: 2026-03-01                                                  ║
# ║  Zweck:        Gemeinsame Middlewares (Security-Headers)                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

http:
  middlewares:
    # --- Security-Headers ---
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
