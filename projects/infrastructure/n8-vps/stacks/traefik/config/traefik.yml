# --- API & Dashboard ---
api:
  dashboard: true
  insecure: false

# --- EntryPoints ---
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt-production

# --- Providers ---
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mrbz-proxy-net
  file:
    directory: "/etc/traefik/dynamic/"
    watch: true

# --- Certificates Resolvers (ACME) ---
certificatesResolvers:
  letsencrypt-production:
    acme:
      email: "traefik@mr-bytez.de"
      storage: "/letsencrypt/acme.json"
      dnsChallenge:
        provider: hetzner
        # DNS-Aufloesung ueber Docker-internen DNS (→ Host Unbound)
        # Kein externer Resolver noetig, UFW blockt Outbound DNS

# --- Logging ---
log:
  level: "INFO"
  filePath: "/var/log/traefik/error.log"

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
