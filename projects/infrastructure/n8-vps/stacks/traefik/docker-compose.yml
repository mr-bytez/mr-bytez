services:
  traefik:
    image: traefik:v3.6
    container_name: mrbz-traefik
    hostname: traefik.proxy.docker.n8vps
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - HETZNER_API_TOKEN=${HETZNER_API_TOKEN}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
    volumes:
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic/:/etc/traefik/dynamic/:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - mrbz-traefik-certs:/letsencrypt
      - /var/log/traefik/:/var/log/traefik/
    networks:
      - mrbz-proxy-net
    labels:
      # Traefik Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.mr-bytez.de`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt-production"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=crowdsec-bouncer@file,authentik-forward-auth@file,security-headers@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  mrbz-traefik-certs:
    name: mrbz-traefik-certs

networks:
  mrbz-proxy-net:
    external: true
