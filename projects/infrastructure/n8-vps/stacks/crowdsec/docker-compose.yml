# ==============================================================================
# Architektur:
#   - CrowdSec Agent: Analysiert Traefik Access-Logs, meldet an Central API
#   - Traefik Bouncer: Via Plugin in Traefik (separate Config in traefik.yml)
#   - Firewall Bouncer: Systemd-Service auf Host (manuell installiert, nicht hier)
# ==============================================================================

services:

  # --- CrowdSec Security Engine (Agent + LAPI) ---
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: mrbz-crowdsec
    hostname: crowdsec.docker.n8vps
    restart: unless-stopped
    environment:
      # --- Collections (automatisch beim Start installiert) ---
      COLLECTIONS: >-
        crowdsecurity/traefik
        crowdsecurity/http-cve
        crowdsecurity/http-dos
        crowdsecurity/base-http-scenarios
      # --- Central API Enrollment ---
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY}
      ENROLL_INSTANCE_NAME: n8-vps
      ENROLL_TAGS: n8-vps traefik production
      # --- Timezone ---
      TZ: Europe/Berlin
    volumes:
      # CrowdSec Config + Data (persistent)
      - mrbz-crowdsec-config:/etc/crowdsec
      - mrbz-crowdsec-data:/var/lib/crowdsec/data
      # Traefik Access-Log (read-only)
      - /var/log/traefik/access.log:/var/log/traefik/access.log:ro
      # Acquisition Config
      - ./config/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
    ports:
      # LAPI nur lokal erreichbar (nicht oeffentlich!)
      - "127.0.0.1:8080:8080"
    networks:
      mrbz-crowdsec-net:
        ipv4_address: 172.21.0.100
      mrbz-proxy-net:
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  mrbz-crowdsec-config:
    name: mrbz-crowdsec-config
  mrbz-crowdsec-data:
    name: mrbz-crowdsec-data

# ==============================================================================
# Networks
# ==============================================================================
networks:
  mrbz-proxy-net:
    external: true
  mrbz-crowdsec-net:
    name: mrbz-crowdsec-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1
