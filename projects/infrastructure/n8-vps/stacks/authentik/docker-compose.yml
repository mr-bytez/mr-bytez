# ==============================================================================
# Authentik Environment Anchor (DRY — wird von server + worker geteilt)
# ==============================================================================
x-authentik-env: &authentik-env
  AUTHENTIK_POSTGRESQL__HOST: mrbz-authentik-postgres
  AUTHENTIK_POSTGRESQL__PORT: 5432
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: file://${AUTHENTIK_DB_PASSWORD_FILE}
  AUTHENTIK_SECRET_KEY: file://${AUTHENTIK_SECRET_KEY_FILE}
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
  AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
  AUTHENTIK_AVATARS: initials
  AUTHENTIK_DEFAULT_USER_CHANGE_NAME: "false"
  AUTHENTIK_DEFAULT_USER_CHANGE_EMAIL: "false"
  AUTHENTIK_DEFAULT_USER_CHANGE_USERNAME: "false"
  AUTHENTIK_COOKIE_DOMAIN: .mr-bytez.de
  AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS: 172.20.0.0/24,10.0.0.0/8
  AUTHENTIK_LOG_LEVEL: info
  AUTHENTIK_HOST_BROWSER: "https://auth.mr-bytez.de"
  AUTHENTIK_WEB__CSRF_TRUSTED_ORIGINS: "https://auth.mr-bytez.de"
  # --- Bootstrap (nur beim ersten Start einkommentieren) ---
  # AUTHENTIK_BOOTSTRAP_PASSWORD: file://${AUTHENTIK_BOOTSTRAP_PASSWORD_FILE}
  # AUTHENTIK_BOOTSTRAP_TOKEN: file://${AUTHENTIK_BOOTSTRAP_TOKEN_FILE}
  # AUTHENTIK_BOOTSTRAP_EMAIL: admin@mr-bytez.de

# ==============================================================================
# Services
# ==============================================================================
services:

  # --- PostgreSQL 18 ---
  postgres:
    image: postgres:18-alpine
    container_name: mrbz-authentik-postgres
    hostname: postgres.authentik.docker.n8vps
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: Europe/Berlin
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD_FILE: ${AUTHENTIK_DB_PASSWORD_FILE}
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --data-checksums"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=8GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "max_locks_per_transaction=256"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_timezone=Europe/Berlin"
      - "-c"
      - "timezone=Europe/Berlin"
    volumes:
      - mrbz-authentik-postgres-data:/var/lib/postgresql
      - ${AUTHENTIK_DB_PASSWORD_FILE}:${AUTHENTIK_DB_PASSWORD_FILE}:ro
    networks:
      mrbz-authentik-net:
        ipv4_address: 172.20.0.100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Authentik Server (Web-UI + API) ---
  server:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: mrbz-authentik-server
    hostname: server.authentik.docker.n8vps
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: server
    environment:
      <<: *authentik-env
      AUTHENTIK_WEB__WORKERS: 4
      AUTHENTIK_WEB__THREADS: 4
    volumes:
      - mrbz-authentik-media:/media
      - mrbz-authentik-templates:/templates
      - ${AUTHENTIK_DB_PASSWORD_FILE}:${AUTHENTIK_DB_PASSWORD_FILE}:ro
      - ${AUTHENTIK_SECRET_KEY_FILE}:${AUTHENTIK_SECRET_KEY_FILE}:ro
    networks:
      mrbz-proxy-net:
      mrbz-authentik-net:
        ipv4_address: 172.20.0.102
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.mr-bytez.de`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt-production"
      - "traefik.http.routers.authentik.middlewares=crowdsec-bouncer@file,security-headers@file"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.docker.network=mrbz-proxy-net"
      # Forward-Auth Outpost (fuer alle geschuetzten *.mr-bytez.de Domains)
      # Verhindert Auth-Loop: Outpost-Pfade werden direkt an Authentik geroutet
      - "traefik.http.routers.authentik-outpost.rule=HostRegexp(`^.+\\.mr-bytez\\.de$$`) && PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.authentik-outpost.entrypoints=websecure"
      - "traefik.http.routers.authentik-outpost.tls.certresolver=letsencrypt-production"
      - "traefik.http.routers.authentik-outpost.middlewares=security-headers@file"
      - "traefik.http.routers.authentik-outpost.service=authentik"
      - "traefik.http.routers.authentik-outpost.priority=200"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # --- Authentik Worker (Hintergrund-Tasks) ---
  worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: mrbz-authentik-worker
    hostname: worker.authentik.docker.n8vps
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: worker
    environment:
      <<: *authentik-env
    volumes:
      - mrbz-authentik-media:/media
      - mrbz-authentik-templates:/templates
      - mrbz-authentik-certs:/certs
      - ${AUTHENTIK_DB_PASSWORD_FILE}:${AUTHENTIK_DB_PASSWORD_FILE}:ro
      - ${AUTHENTIK_SECRET_KEY_FILE}:${AUTHENTIK_SECRET_KEY_FILE}:ro
    networks:
      mrbz-authentik-net:
        ipv4_address: 172.20.0.103
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  mrbz-authentik-postgres-data:
    name: mrbz-authentik-postgres-data
    external: true
  mrbz-authentik-media:
    name: mrbz-authentik-media
  mrbz-authentik-templates:
    name: mrbz-authentik-templates
  mrbz-authentik-certs:
    name: mrbz-authentik-certs

# ==============================================================================
# Networks
# ==============================================================================
networks:
  mrbz-proxy-net:
    external: true
  mrbz-authentik-net:
    name: mrbz-authentik-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
