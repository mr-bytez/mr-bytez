# --- Traefik Access-Log (JSON-Format) ---
filenames:
  - /var/log/traefik/access.log
labels:
  type: traefik
---
# --- SSH / sshd (systemd Journal, nativ) ---
# CrowdSec nativ hat direkten journalctl-Zugriff — kein Workaround noetig.
# OpenSSH 9.8+ nutzt sshd-auth/sshd-session statt sshd — CrowdSec erkennt
# beide Varianten ueber den syslog-Parser.
source: journalctl
journalctl_filter:
  - "_SYSTEMD_UNIT=sshd.service"
labels:
  type: syslog
